name: KSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        codename:
          - ginkgo
        anykernel_branch:
          - master

    env:
      TZ: Asia/Jakarta
      BOT_TOKEN: 7868194496:AAGY7WwRRbeCOPYOnczoCPh2psC43Q0F3JI
      CHAT_ID: -1002287610863
      KERNEL_NAME: AnjaniLaurens
      KERNEL_BRANCH: main
      KERNEL_REPO: https://github.com/malkist01/G1
      ANYKERNEL_REPO: https://github.com/malkist01/Anykernel2
      CLANG_URL: https://gitea.com/GustavoMends/r563880.git
      KSU_URL: https://raw.githubusercontent.com/malkist01/SU/main/kernel/setup.sh
      KSU_BRANCH: main

    steps:
    - name: Checkout workflow repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends python3-pip git zip unzip gcc g++ make ninja-build file bc bison flex libfl-dev libssl-dev libelf-dev wget build-essential python3-dev python3-setuptools rsync ccache llvm-dev libncurses6 libfdt-dev binwalk
    - name: Clone kernel source
      run: |
        git clone --depth=1 "$KERNEL_REPO" -b "$KERNEL_BRANCH" kernel
        cd kernel
        echo "KERNEL_DIR=$(pwd)" >> $GITHUB_ENV

    - name: Clone AnyKernel3
      run: |
        cd $KERNEL_DIR
        git clone --depth=1 -b "${{ matrix.anykernel_branch }}" "$ANYKERNEL_REPO" AnyKernel3
        echo "ANYKERNEL_DIR=$KERNEL_DIR/AnyKernel3" >> $GITHUB_ENV

    - name: Clone clang
      run: |
        cd $KERNEL_DIR
        git clone --depth=1 "$CLANG_URL" clang
        echo "CLANG_DIR=$KERNEL_DIR/clang" >> $GITHUB_ENV

    - name: Cache Clang
      uses: actions/cache@v4
      id: cache-clang
      with:
       path: $KERNEL_DIR/clang
       key: clang-r563880-ubuntu-latest

    - name: Set up ccache
      run: |
          ccache --max-size=12G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$KERNEL_DIR/.ccache" >> $GITHUB_ENV       

    - name: Set up KSU
      run: |
        cd $KERNEL_DIR
        curl -LSs "$KSU_URL" | bash -s $KSU_BRANCH

    - name: Generate defconfig
      run: |
        cd $KERNEL_DIR
        CONFIG_NAME="${{ matrix.codename }}_defconfig"
        DEFCONFIG_PATH="arch/arm64/configs/vendor/$CONFIG_NAME"
        echo "CONFIG_KSU=y" >> "${DEFCONFIG_PATH}"
        echo "CONFIG_KSU_TAMPER_SYSCALL_TABLE=y" >> "${DEFCONFIG_PATH}"
        echo "CONFIG_KSU_EXTRAS=y" >> "${DEFCONFIG_PATH}"
        make O=out ARCH=arm64 vendor/"$CONFIG_NAME"
        mv out/.config "$DEFCONFIG_PATH"

    - name: Build kernel
      run: |
        escape_markdown_v2() { 
            echo "$1" | sed -e 's/\\/\\\\/g' -e 's/_/\\_/g' -e 's/\*/\\*/g' -e 's/\[/\\[/g' -e 's/\]/\\]/g' -e 's/(/\\(/g' -e 's/)/\\)/g' -e 's/~/\\~/g' -e 's/`/\\`/g' -e 's/>/\\>/g' -e 's/#/\\#/g' -e 's/+/\\+/g' -e 's/-/\\-/g' -e 's/=/\\=/g' -e 's/|/\\|/g' -e 's/{/\\{/g' -e 's/}/\\}/g';
        }

        send_telegram_message() {
            local MESSAGE="$1"
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
                -d "chat_id=$CHAT_ID" \
                -d "text=$MESSAGE"
        }

        send_telegram_file() {
            local FILE_PATH="$1"
            local FILE_NAME=$(basename "$FILE_PATH")
            local ESCAPED_NAME="Build info:
            
        рџ“± Device : ginkgo
        рџ“¦ Kernel Name : AnjaniLaurens
        рџЌѓ Kernel Version : 4.14.356

        рџ›  Clang version : $(clang --version 2>&1 | head -n 1)
        вљ™пёЏ Lld_version : $(ld.lld --version 2>&1 | head -n 1)
        рџ’» Build host: Android@Phone
        рџ“† Buid date : $(date +'%H%M-%d%m%y')"
        
            local CAPTION="\`$ESCAPED_NAME\`"

            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendDocument" \
                -F "chat_id=$CHAT_ID" \
                -F "document=@$FILE_PATH" \
                -F "caption=$CAPTION" \
                -F "parse_mode=MarkdownV2"
        }

        stop_handler() {
          send_telegram_message "вљ пёЏ Compilation was unexpectedly stopped!"
          [ -f "$LOG_FILE" ] && send_telegram_file "$LOG_FILE"
          exit 1
        }

        trap stop_handler ERR INT

        cd $KERNEL_DIR
        LOG_FILE=$KERNEL_DIR/build.log
        OUT_DIR=$KERNEL_DIR/out
        KERNEL_IMAGE_DIR=$OUT_DIR/arch/arm64/boot
        KERNEL_IMAGE=$KERNEL_IMAGE_DIR/Image.gz-dtb
        DTBO_IMAGE=$KERNEL_IMAGE_DIR/dtbo.img
        CONFIG_NAME="${{ matrix.codename }}_defconfig"
        KERNEL_COMMIT_ID=$(git rev-parse --short=7 HEAD)
        ZIP_NAME="${KERNEL_NAME}_${{ matrix.codename }}-$(date +%Y%m%d).zip"
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        echo "LOG_FILE=$LOG_FILE" >> $GITHUB_ENV

        send_telegram_message "рџ”Ё Starting kernel compilation for $CODENAME on branch $KERNEL_BRANCH"
        export CCACHE_EXEC=$(which ccache)
        export KBUILD_BUILD_USER=ivy
        export KBUILD_BUILD_HOST="$KERNEL_COMMIT_ID"
        export PATH="$CLANG_DIR/bin:$PATH"
        mkdir -p "$OUT_DIR"

        make O="$OUT_DIR" ARCH=arm64 vendor/"$CONFIG_NAME"
        make -j$(nproc) O="$OUT_DIR" ARCH=arm64 \
          CC="ccache clang" \ LD=ld.lld LLVM=1 \ LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          2>&1 | tee -a "$LOG_FILE"

        BUILD_RESULT=${PIPESTATUS[0]}

        if [ "$BUILD_RESULT" -ne 0 ]; then
          send_telegram_message "вќЊ Compilation failed for ${{ matrix.codename }}!"
          send_telegram_file "$LOG_FILE"
          exit 1
        fi

        cp "$KERNEL_IMAGE" "$ANYKERNEL_DIR/Image.gz-dtb"
        cp "$DTBO_IMAGE" "$ANYKERNEL_DIR/dtbo.img"
        cd "$ANYKERNEL_DIR"
        zip -r9 "../$ZIP_NAME" ./* > /dev/null
        cd "$KERNEL_DIR"

         INFO="Build info:
        рџ“± Device : ginkgo
        рџ“¦ Kernel Name : AnjaniLaurens
        рџЌѓ Kernel Version : 4.14.356

        рџ›  Toolchain : Aosp Clang r563880
        рџ’» Build host: Android@Phone"
        
        send_telegram_file "$ZIP_NAME"
        send_telegram_file "$LOG_FILE"
        send_telegram_message "$INFO"      
        send_telegram_message "вњ… Compilation completed for ${{ matrix.codename }} Flashable zip is ready."

    - name: Upload kernel zip artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.codename }}-${{ env.ZIP_NAME }}
        path: ${{ env.KERNEL_DIR }}/${{ env.ZIP_NAME }}

    - name: Upload build log artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-${{ matrix.codename }}
        path: ${{ env.LOG_FILE }}
        
